services:
  migrate:
    image: adlan-tg-bot:latest
    build: .
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/bot.sqlite3
    command: ["python", "-m", "app.db.migrations"]
    volumes:
      - /root/adlanbot/data:/app/data
    restart: "no"

  api:
    image: adlan-tg-bot:latest
    build: .
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/bot.sqlite3
    command: ["uvicorn", "app.api.app:create_app", "--factory", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - /root/adlanbot/data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  bot:
    image: adlan-tg-bot:latest
    build: .
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/bot.sqlite3
    command: ["python", "-m", "app.main"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - /root/adlanbot/data:/app/data
    restart: unless-stopped
